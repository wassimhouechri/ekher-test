name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  nv:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ekher-test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety semgrep pip-licenses

      - name: Bandit — static code analysis
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --exclude app/tests || true

      - name: Semgrep — OWASP + custom rules
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --json \
            --output semgrep-report.json \
            app/ || true

      - name: Safety CLI — check CVEs in dependencies
        run: |
          # Filtrer pywin32 si présent (Windows uniquement)
          if [ -f app/requirements.txt ]; then
            grep -v "pywin32" app/requirements.txt > app/requirements-linux.txt
            safety check -r app/requirements-linux.txt --json > safety-report.json || true
          else
            echo "{}" > safety-report.json
          fi
          echo "Safety scan complete"

      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning
        continue-on-error: true

      - name: Licence check
        run: |
          # Installer sans pywin32
          if [ -f app/requirements.txt ]; then
            grep -v "pywin32" app/requirements.txt > app/requirements-linux.txt
            pip install -r app/requirements-linux.txt --quiet || true
          fi
          pip-licenses --format=json --output-file=licenses-report.json

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
            licenses-report.json
          retention-days: 14

  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkov — IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: false
          output_format: cli,sarif
          skip_check: "CKV_K8S_43,CKV_K8S_14"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          # Nettoyer requirements.txt pour Linux
          if [ -f app/requirements.txt ]; then
            grep -v "pywin32" app/requirements.txt > app/requirements-linux.txt
            mv app/requirements-linux.txt app/requirements.txt
          fi
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Start application container
        run: |
          docker run -d \
            --name test-app \
            -p 5000:5000 \
            -e API_KEY="zap-test-key" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for app to be healthy
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:5000/health; then
              echo "App is ready"
              exit 0
            fi
            sleep 3
          done
          echo "App did not become healthy in time"
          exit 1

      - name: OWASP ZAP — baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report.html
          retention-days: 14

      - name: Stop test container
        if: always()
        run: |
          docker stop test-app && docker rm test-app